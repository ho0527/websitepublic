<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>CSS Bar Chart</title>
		<style>
			.chart {
				width: 500px;
				height: 300px;
				margin: 50px auto;
				display: flex;
				align-items: flex-end;
				justify-content: space-evenly;
				background: whitesmoke;
			}

			.bar {
				width: 40px;
				height: 0;
				background: gray;
				transition: height 0.5s ease-out;
			}

			.bar1 {
				transition-delay: 0s;
			}
			.bar2 {
				transition-delay: 0.2s;
			}
			.bar3 {
				transition-delay: 0.4s;
			}

			.bar1 {
				background: red;
			}
			.bar2 {
				background: blue;
			}
			.bar3 {
				background: green;
			}

			.chart:hover .bar1 {
				height: 60%;
				background: red;
				transition-delay: 0s;
			}
			.chart:hover .bar2 {
				height: 80%;
				background: blue;
				transition-delay: 0.2s;
			}
			.chart:hover .bar3 {
				height: 50%;
				background: green;
				transition-delay: 0.4s;
			}
		</style>
	</head>
	<body>
		<div class="chart">
			<div class="bar bar1"></div>
			<div class="bar bar2"></div>
			<div class="bar bar3"></div>
		</div>
	</body>
</html>
