<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .main {
                border: 1px black solid;
                background: whitesmoke;
                width: 500px;
                height: 300px;
                margin: 0px auto;
                display: flex;
                align-items: end;
                justify-content: space-around;
            }

            .line {
                width: 50px;
                height: 0px;
                transition: 0.5s ease-in-out;
            }

            .main:hover .a {
                background: red;
                height: 30%;
            }

            .main:hover .b {
                background: blue;
                height: 70%;
            }

            .main:hover .c {
                background: green;
                height: 50%;
            }
        </style>
    </head>
    <body>
        <div class="main">
            <div class="a line"></div>
            <div class="b line"></div>
            <div class="c line"></div>
        </div>
    </body>
</html>
